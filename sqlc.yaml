version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/query"
    schema: "internal/database/migrations"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_exact_table_names: false
        overrides:
          - db_type: "citext"
            go_type: "string"
